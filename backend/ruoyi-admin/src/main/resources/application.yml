# Project config
ruoyi:
  name: RuoYi
  version: 3.9.1
  copyrightYear: 2025
  profile: D:/ruoyi/uploadPath
  addressEnabled: false
  captchaType: math

upload:
  # cos: Tencent Cloud COS; local: original RuoYi local /profile storage
  backend: ${UPLOAD_BACKEND:cos}



# Server config
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# Logging config
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# User config
user:
  password:
    maxRetryCount: 5
    lockTime: 10

# Spring config
spring:
  messages:
    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: true
  redis:
    host: localhost
    port: 6379
    database: 0
    password:
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# Token config
token:
  header: Authorization
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 30

# MyBatis config
mybatis:
  typeAliasesPackage: com.ruoyi.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper config
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger config
swagger:
  enabled: true
  pathMapping: /dev-api

# Referer anti-hotlink config
referer:
  enabled: false
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# XSS config
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
